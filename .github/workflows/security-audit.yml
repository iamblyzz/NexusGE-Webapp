# =============================================================================
# Nexus Global Enterprise — Security Audit Pipeline
# =============================================================================
#
# PURPOSE
#   Automated security scanning layer that runs on every push to main and on
#   every pull request targeting main. Three independent scan layers run in
#   parallel, each covering a distinct threat surface:
#
#     1. TruffleHog  — detects hardcoded API keys, secrets, and credential leaks
#                      in the git history and working tree.
#     2. OSV-Scanner — cross-references all dependencies (npm) against the
#                      Google Open Source Vulnerabilities database.
#     3. npm audit   — native Node.js dependency audit for high/critical CVEs.
#
# REPLICATION
#   To deploy this pipeline to a new client repository:
#     1. Copy this file to .github/workflows/security-audit.yml in the target repo.
#     2. Adjust the Node.js version under "Setup Node" if the project differs.
#     3. If the project uses yarn or pnpm, replace the npm commands accordingly.
#     4. Ensure the repository has GitHub Actions enabled (Settings → Actions).
#
# FAILURE BEHAVIOUR
#   Any scan that detects a vulnerability exits with a non-zero code, which
#   causes GitHub to mark the check as failed and blocks the PR from merging
#   if branch protection is configured (recommended).
#
# =============================================================================

name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same ref so stale scans do not block new ones.
concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 — Secret & Credential Leak Detection (TruffleHog)
  # ---------------------------------------------------------------------------
  # Scans the full git history for entropy-based and pattern-based secrets:
  # API keys, database URLs, JWT signing secrets, private keys, tokens, etc.
  # Runs in verified mode — only reports findings with high confidence to
  # minimise false-positive noise.
  # ---------------------------------------------------------------------------
  trufflehog-scan:
    name: "Secret Leak Scan (TruffleHog)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Full history required for git-log scanning.

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~1' }}
          head: HEAD
          extra_args: >
            --only-verified
            --fail
            --no-update

      # If TruffleHog finds a verified secret, it exits non-zero and the step
      # above fails. The message below is printed before the job is marked red.
      - name: Print failure guidance on secret detection
        if: failure()
        run: |
          echo ""
          echo "========================================================"
          echo "  SECURITY FAILURE: Verified secret detected by TruffleHog"
          echo "========================================================"
          echo ""
          echo "  One or more high-confidence credentials were found in the"
          echo "  repository history or working tree."
          echo ""
          echo "  IMMEDIATE ACTIONS REQUIRED:"
          echo "  1. Identify the exposed credential in the scan output above."
          echo "  2. Rotate the compromised key or token IMMEDIATELY — assume"
          echo "     it has already been seen by automated scrapers."
          echo "  3. Remove the secret from the codebase and git history:"
          echo "       git filter-repo --path <file> --invert-paths"
          echo "     or use BFG Repo Cleaner for large histories."
          echo "  4. Confirm the secret is loaded only from environment variables"
          echo "     (Vercel dashboard / .env.local) and never committed."
          echo "  5. Re-run this workflow after remediation to confirm clean."
          echo ""
          echo "  NEVER commit API keys, database passwords, JWT secrets,"
          echo "  service role keys, or private certificates to version control."
          echo "========================================================"
          exit 1


  # ---------------------------------------------------------------------------
  # JOB 2 — Dependency Vulnerability Scan (OSV-Scanner)
  # ---------------------------------------------------------------------------
  # Cross-references package-lock.json against the Google OSV database, which
  # aggregates CVEs, GitHub Security Advisories, and ecosystem-specific
  # vulnerability databases (npm, PyPI, etc.) into a single feed.
  # ---------------------------------------------------------------------------
  osv-scan:
    name: "Dependency Vulnerability Scan (OSV-Scanner)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OSV-Scanner against npm lockfile
        uses: google/osv-scanner-action@v1.9.2
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --format=table
            --fail-on-vuln

      - name: Print failure guidance on vulnerable dependency
        if: failure()
        run: |
          echo ""
          echo "========================================================"
          echo "  SECURITY FAILURE: Vulnerable dependency detected (OSV)"
          echo "========================================================"
          echo ""
          echo "  One or more dependencies have known vulnerabilities in the"
          echo "  OSV database (CVE, GHSA, or ecosystem advisory)."
          echo ""
          echo "  REMEDIATION STEPS:"
          echo "  1. Review the vulnerability table printed above."
          echo "  2. Check the severity and whether your code exercises the"
          echo "     affected code path."
          echo "  3. Update the affected package:"
          echo "       npm update <package-name>"
          echo "     or pin to a patched version in package.json."
          echo "  4. If no patch is available, assess whether a safe alternative"
          echo "     package exists and migrate accordingly."
          echo "  5. Run 'npm install' to regenerate package-lock.json, then"
          echo "     commit the updated lockfile."
          echo "========================================================"
          exit 1


  # ---------------------------------------------------------------------------
  # JOB 3 — npm Native Audit (High + Critical CVEs)
  # ---------------------------------------------------------------------------
  # Runs npm's built-in security audit and fails the build if any HIGH or
  # CRITICAL severity vulnerabilities are found in direct or transitive deps.
  # Moderate and low findings are reported as warnings but do not fail.
  # ---------------------------------------------------------------------------
  npm-audit:
    name: "npm Dependency Audit (High/Critical)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (clean install, no scripts)
        run: npm ci --ignore-scripts
        # --ignore-scripts prevents potentially malicious postinstall scripts
        # from executing during the security audit phase.

      - name: Run npm audit — fail on high/critical
        run: |
          echo ""
          echo "--------------------------------------------------------"
          echo "  npm audit — scanning for HIGH and CRITICAL CVEs"
          echo "--------------------------------------------------------"
          npm audit --audit-level=high --json | tee audit-report.json | \
            npx --yes better-npm-audit audit --level high || AUDIT_EXIT=$?

          # Also print the human-readable summary for the Actions log.
          npm audit --audit-level=high || true
          exit ${AUDIT_EXIT:-0}

      - name: Upload audit report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report-${{ github.sha }}
          path: audit-report.json
          retention-days: 30
          # Artifact is retained for 30 days so past audit snapshots can be
          # compared during incident investigation.

      - name: Print failure guidance on npm audit failure
        if: failure()
        run: |
          echo ""
          echo "========================================================"
          echo "  SECURITY FAILURE: High or Critical npm CVE detected"
          echo "========================================================"
          echo ""
          echo "  npm audit found HIGH or CRITICAL severity vulnerabilities"
          echo "  in the project dependency tree."
          echo ""
          echo "  REMEDIATION STEPS:"
          echo "  1. Review the findings in audit-report.json (uploaded as an"
          echo "     Actions artifact for this run)."
          echo "  2. Run locally to see full details:"
          echo "       npm audit"
          echo "  3. Apply automatic fixes where safe:"
          echo "       npm audit fix"
          echo "     For breaking changes use:"
          echo "       npm audit fix --force  (review changes carefully)"
          echo "  4. For packages with no available fix, check the CVE advisory"
          echo "     for a patched version or safe alternative."
          echo "  5. Commit the updated package-lock.json and re-run this"
          echo "     workflow to confirm the finding is resolved."
          echo "========================================================"
          exit 1


  # ---------------------------------------------------------------------------
  # JOB 4 — Audit Summary Gate
  # ---------------------------------------------------------------------------
  # Aggregates the results of all three scan jobs. Requires all three to pass
  # before reporting the overall security check as green. This is the job that
  # branch protection rules should reference (name: "Security Gate").
  # ---------------------------------------------------------------------------
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs: [trufflehog-scan, osv-scan, npm-audit]
    if: always()

    steps:
      - name: Evaluate all scan results
        run: |
          echo ""
          echo "========================================================"
          echo "  Nexus Global Enterprise — Security Audit Summary"
          echo "========================================================"
          echo ""
          echo "  TruffleHog Secret Scan : ${{ needs.trufflehog-scan.result }}"
          echo "  OSV Dependency Scan    : ${{ needs.osv-scan.result }}"
          echo "  npm Audit              : ${{ needs.npm-audit.result }}"
          echo ""

          if [[ "${{ needs.trufflehog-scan.result }}" != "success" ]] || \
             [[ "${{ needs.osv-scan.result }}"       != "success" ]] || \
             [[ "${{ needs.npm-audit.result }}"      != "success" ]]; then
            echo "  STATUS : FAILED — one or more security checks did not pass."
            echo "  ACTION : Review the failing job logs above and remediate"
            echo "           before merging this branch into main."
            echo "========================================================"
            exit 1
          fi

          echo "  STATUS : PASSED — all security checks are clean."
          echo "  This commit is cleared by the automated security audit layer."
          echo "========================================================"
